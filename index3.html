<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Widget</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>

    body {

      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

      color: #202124;

      margin-top: 2rem;

    }

    .weather-container {

      max-width: 850px;

      margin: auto;

    }

    .temp-large {

      font-size: 5rem;

      font-weight: 400;

      line-height: 1;

      letter-spacing: -2px;

    }

    .temp-unit {

      font-size: 1.5rem;

      margin-top: 0.5rem;

      font-weight: bold;

    }

    .weather-details {

      font-size: 0.95rem;

      color: #70757a;

      line-height: 1.6;

    }

    /* Style cho thanh điều hướng (Pills) */

    .weather-pills .btn {

      border-radius: 20px;

      padding: 0.35rem 1rem;

      font-size: 0.9rem;

      border: 1px solid #dadce0;

      color: #3c4043;

      background-color: white;

      display: flex;

      align-items: center;

      gap: 6px;

      transition: all 0.2s ease;

    }

    .weather-pills .btn.active {

      background-color: #1a73e8;

      color: white;

      border-color: #1a73e8;

    }

    .weather-pills .btn:hover:not(.active) {

      background-color: #f8f9fa;

    }

    /* Khung giờ (Hourly forecast) */

    .hourly-box {

      border: 1px solid #dadce0;

      border-radius: 8px;

      padding: 1.5rem 1rem;

    }

    .hourly-item {

      flex: 1;

    }

    .forecast-icon {

      font-size: 1.8rem;

      color: #5f6368;

    }

    /* Khung ngày (Daily forecast) */

    .daily-item {

      flex: 1;

      padding: 0.5rem;

    }

    .text-muted-custom {

      color: #70757a;

    }

    /* Icon thời tiết chính */

    .main-icon {

      font-size: 4.5rem;

      color: #202124;

    }
  </style>
</head>
<body>

<div class="container weather-container">
  <h3 class="fw-bold mb-1">Hà Nội, Vietnam</h3>
  <p class="text-muted-custom mb-3">Mostly Cloudy, 9:23 AM</p>

  <div class="row mb-4 align-items-center">
    <div class="col-sm-6 d-flex align-items-center">
      <i class="bi bi-cloud-sun-fill main-icon me-3"></i>
      <div class="d-flex align-items-start">
        <span class="temp-large">78</span>
        <span class="temp-unit">°F</span>
      </div>
    </div>
    <div class="col-sm-6 weather-details mt-3 mt-sm-0 pl-sm-4">
      <div>Precipitation: 8%</div>
      <div>Humidity: 60%</div>
      <div>Wind: 9 mph</div>
      <div>UV Index: 2</div>
    </div>
  </div>

  <div class="d-flex flex-wrap gap-2 mb-3 weather-pills" id="weather-tabs">
    <button class="btn active" data-type="temperature"><i class="bi bi-thermometer-half"></i> Temperature</button>
    <button class="btn" data-type="precipitation"><i class="bi bi-cloud-rain"></i> Precipitation</button>
    <button class="btn" data-type="wind"><i class="bi bi-wind"></i> Wind</button>
    <button class="btn" data-type="airQuality"><i class="bi bi-cloud-haze2"></i> Air Quality</button>
    <button class="btn" data-type="uvIndex"><i class="bi bi-brightness-high"></i> UV Index</button>
    <button class="btn" data-type="sunsetSunrise"><i class="bi bi-sunrise"></i> Sunset and Sunrise</button>
  </div>

  <div class="hourly-box d-flex justify-content-between text-center mb-4 overflow-auto" id="hourly-forecast">
  </div>

  <div class="d-flex justify-content-between text-center overflow-auto pb-2">
    <div class="daily-item">
      <div class="fw-bold mb-2">Today</div>
      <i class="bi bi-cloud-sun-fill fs-3 mb-2 d-block"></i>
      <div class="text-muted-custom small">74° / 69°</div>
    </div>
    <div class="daily-item">
      <div class="fw-bold mb-2">Wed</div>
      <i class="bi bi-cloud-fill fs-3 mb-2 d-block"></i>
      <div class="text-muted-custom small">78° / 69°</div>
    </div>
    <div class="daily-item">
      <div class="fw-bold mb-2">Thu</div>
      <i class="bi bi-sun fs-3 mb-2 d-block"></i>
      <div class="text-muted-custom small">79° / 64°</div>
    </div>
    <div class="daily-item">
      <div class="fw-bold mb-2">Fri</div>
      <i class="bi bi-cloud-sun-fill fs-3 mb-2 d-block"></i>
      <div class="text-muted-custom small">79° / 62°</div>
    </div>
    <div class="daily-item">
      <div class="fw-bold mb-2">Sat</div>
      <i class="bi bi-cloud-sun fs-3 mb-2 d-block"></i>
      <div class="text-muted-custom small">78° / 62°</div>
    </div>
    <div class="daily-item">
      <div class="fw-bold mb-2">Sun</div>
      <i class="bi bi-cloud-sun-fill fs-3 mb-2 d-block"></i>
      <div class="text-muted-custom small">79° / 63°</div>
    </div>
    <div class="daily-item">
      <div class="fw-bold mb-2">Mon</div>
      <i class="bi bi-sun fs-3 mb-2 d-block"></i>
      <div class="text-muted-custom small">79° / 53°</div>
    </div>
  </div>

</div>

<script>

  // 1. Tạo dữ liệu mẫu cho từng loại thời tiết

  const forecastData = {

    temperature: {

      values: ['78°', '76°', '74°', '72°', '70°', '69°', '72°', '75°'],

      icon: 'bi-thermometer-half'

    },

    precipitation: {

      values: ['0%', '5%', '10%', '20%', '15%', '0%', '0%', '0%'],

      icon: 'bi-cloud-rain'

    },

    wind: {

      values: ['8 mph', '7 mph', '7 mph', '7 mph', '7 mph', '7 mph', '8 mph', '9 mph'],

      icon: 'bi-wind'

    },

    airQuality: {

      values: ['42', '45', '48', '50', '47', '43', '40', '42'],

      icon: 'bi-cloud-haze2'

    },

    uvIndex: {

      values: ['3', '1', '0', '0', '0', '0', '1', '4'],

      icon: 'bi-brightness-high'

    },

    sunsetSunrise: {

      values: ['-', 'Sunset (6:15 PM)', '-', '-', '-', 'Sunrise (5:45 AM)', '-', '-'],

      icon: 'bi-sunrise'

    }

  };

  const timeSlots = ['3pm', '6pm', '9pm', '12am', '3am', '6am', '9am', '12pm'];

  const buttons = document.querySelectorAll('#weather-tabs .btn');

  const hourlyForecastContainer = document.getElementById('hourly-forecast');

  // 2. Hàm vẽ lại giao diện khung giờ

  function renderHourlyForecast(type) {

    // Xóa nội dung cũ

    hourlyForecastContainer.innerHTML = '';

    const data = forecastData[type];

    // Vòng lặp tạo 8 mốc thời gian

    timeSlots.forEach((time, index) => {

      const itemHtml = `
<div class="hourly-item">
<div class="text-muted-custom small mb-2">${time}</div>
<div class="mb-2">${data.values[index]}</div>
<i class="bi ${data.icon} forecast-icon"></i>
</div>

            `;

      // Chèn HTML vào container

      hourlyForecastContainer.insertAdjacentHTML('beforeend', itemHtml);

    });

  }

  // 3. Lắng nghe sự kiện click cho từng nút

  buttons.forEach(button => {

    button.addEventListener('click', function() {

      // Xóa class 'active' khỏi tất cả các nút

      buttons.forEach(btn => btn.classList.remove('active'));

      // Thêm class 'active' cho nút vừa click

      this.classList.add('active');

      // Lấy loại dữ liệu từ thuộc tính data-type và render lại

      const type = this.getAttribute('data-type');

      renderHourlyForecast(type);

    });

  });

  // 4. Chạy lần đầu tiên cho nút Temperature

  renderHourlyForecast('temperature');

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
